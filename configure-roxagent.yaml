---
# Configure RHACS roxagent on RHEL VMs via the roxagent Ansible role.
#
# Manual AAP / ansible-playbook run (limit or select hosts from inventory):
#   ansible-playbook configure-roxagent.yaml -l my-rhel-vm \
#     -e roxagent_registry_username='...' -e roxagent_registry_password='...'
#
# AAP provisioning callback extra_vars (set by cloud-init on vuln-scan VMs):
#   roxagent_kubevirt_namespace, roxagent_kubevirt_vm_name (or roxagent_target_host),
#   roxagent_ansible_user
#
# SSH to pod-network VMs uses virtctl port-forward (see roxagent_virtctl_ssh in
# roles/roxagent/defaults/main.yml). Attach the OpenShift/Kubernetes credential
# used for the inventory source (for example ISAR-VM-Connect) to the job template.

- name: Configure roxagent
  hosts: "{{ roxagent_play_hosts | default('all') }}"
  become: true
  gather_facts: false
  pre_tasks:
    - name: Configure KubeVirt SSH connection
      ansible.builtin.include_tasks: roles/roxagent/tasks/set-kubevirt-connection.yml
      when: roxagent_virtctl_ssh | default(true) | bool

    - name: Gather facts
      ansible.builtin.setup:

  roles:
    - roxagent
