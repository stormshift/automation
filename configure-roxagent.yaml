---
# Configure RHACS roxagent on RHEL VMs via the roxagent Ansible role.
#
# Manual AAP / ansible-playbook run (limit or select hosts from inventory):
#   ansible-playbook configure-roxagent.yaml -l my-rhel-vm \
#     -e roxagent_registry_username='...' -e roxagent_registry_password='...'
#
# AAP provisioning callback extra_vars (set by cloud-init on vuln-scan VMs):
#   roxagent_ansible_host, roxagent_ansible_user
# AAP adds the calling host to the job inventory; extra_vars override connection settings.

- name: Configure roxagent
  hosts: "{{ roxagent_play_hosts | default('all') }}"
  become: true
  gather_facts: true
  vars:
    ansible_host: "{{ roxagent_ansible_host | default(omit) }}"
    ansible_user: "{{ roxagent_ansible_user | default(omit) }}"
  roles:
    - roxagent
