---
# Register the AAP job template for RHACS roxagent provisioning (with callback).
#
# Run once against AAP controller inventory (e.g. localhost with awx.awx collection):
#   ansible-navigator run configure-roxagent-job-template.yaml
#
# After creation, note the job template ID and set ROXAGENT_AAP_CALLBACK_URL in
# vuln-scan VM templates. Store roxagent_aap_host_config_key in Vault (not in git).

- hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - awx.awx
  vars:
    roxagent_aap_project: stormshift-automation
    roxagent_aap_inventory: stormshift-inventory-from-git
    roxagent_aap_organization: stormshift
    roxagent_aap_execution_environment: stormshift-automation-execution-environment-202602021722
    # Override via -e roxagent_aap_host_config_key=... (from Vault); do not commit secrets.
    roxagent_aap_host_config_key: "{{ lookup('ansible.builtin.env', 'ROXAGENT_AAP_HOST_CONFIG_KEY', default='') }}"
    roxagent_aap_job_template_name: Configure RHACS Roxagent

  tasks:
    - name: Fail when host config key is not provided
      ansible.builtin.fail:
        msg: >-
          Set ROXAGENT_AAP_HOST_CONFIG_KEY in the environment or pass
          -e roxagent_aap_host_config_key=... when running this playbook.
      when: roxagent_aap_host_config_key | length == 0

    - name: Create roxagent job template
      awx.awx.job_template:
        name: "{{ roxagent_aap_job_template_name }}"
        description: >-
          Install/update RHACS roxagent on RHEL VMs. Managed by
          configure-roxagent-job-template.yaml. Supports provisioning callbacks.
        job_type: run
        organization: "{{ roxagent_aap_organization }}"
        inventory: "{{ roxagent_aap_inventory }}"
        project: "{{ roxagent_aap_project }}"
        playbook: configure-roxagent.yaml
        execution_environment: "{{ roxagent_aap_execution_environment }}"
        credentials:
          - automation-vault
          - stormshift-automation-pullsecret
          - stormshift-automation-ssh
        state: present
        allow_simultaneous: true
        ask_variables_on_launch: true
        extra_vars:
          roxagent_rhacs_image: registry.redhat.io/advanced-cluster-security/rhacs-main-rhel8:4.11.0
        enable_provisioning_callback: true
        host_config_key: "{{ roxagent_aap_host_config_key }}"

    - name: Show callback URL placeholder
      ansible.builtin.debug:
        msg: >-
          Job template created. In the AAP UI, copy the provisioning callback URL
          and set ROXAGENT_AAP_CALLBACK_URL in vuln-scan VM templates.
