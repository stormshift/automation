---
# RHACS container image (independent of host RHEL major version).
roxagent_rhacs_image: registry.redhat.io/advanced-cluster-security/rhacs-main-rhel9:4.11.0

roxagent_auth_file: /etc/containers/auth.json
roxagent_state_dir: /etc/roxagent
roxagent_state_image_file: "{{ roxagent_state_dir }}/image"

# Preferred: full auth dict (e.g. decoded .dockerconfigjson from pull secret).
roxagent_registry_auth: {}

# Fallback when roxagent_registry_auth is empty.
roxagent_registry_username: ""
roxagent_registry_password: ""

roxagent_run_initial_scan: true

roxagent_timer_on_boot_sec: 5min
roxagent_timer_on_unit_active_sec: 3h40m
roxagent_timer_randomized_delay_sec: 40min

roxagent_service_timeout_start_sec: 300

# KubeVirt / OpenShift Virtualization SSH via virtctl (AAP runs outside pod network).
roxagent_virtctl_ssh: true
roxagent_virtctl_binary: virtctl
roxagent_virtctl_ssh_common_args: >-
  -o ProxyCommand="{{ roxagent_virtctl_binary }} port-forward --stdio=true %h %p"
  -o ControlMaster=no
  -o StrictHostKeyChecking=no
  -o UserKnownHostsFile=/dev/null
roxagent_vm_ssh_user: cloud-user
roxagent_kubevirt_namespace: ""
roxagent_kubevirt_vm_name: ""
